<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Farmasi</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <!-- SIDEBAR -->
    <aside class="sidebar">

        <!-- DROPDOWN BIDANG -->
<div class="dropdown-wrapper">
    <button class="dropdown-btn" onclick="toggleBidang()">
        Pilih Bidang ▼
    </button>

    <ul id="bidangList" class="dropdown-content">
        <!-- diisi JS -->

        <li class="add-bidang-form">
            <input type="text" id="newBidang" placeholder="Tambah bidang...">
            <button onclick="tambahBidang()">+</button>
        </li>
    </ul>
</div>

<!-- MODAL KONFIRMASI -->
<div id="confirmModal" class="modal">
  <div class="modal-box">
    <h3>Konfirmasi</h3>
    <p id="confirmText">Yakin ingin menghapus?</p>

    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Batal</button>
      <button class="btn-delete" onclick="confirmDelete()">Hapus</button>
    </div>
  </div>
</div>

<div class="filter-title">Filter Berdasarkan Dokter :</div>

<!-- LIST DOKTER -->
<ul id="doctorList" class="doctor-list">
    <li>Silakan pilih bidang dahulu</li>
</ul>

<!-- TAMBAH DOKTER -->
<div class="add-section">
    <input type="text" id="newDoctor" placeholder="Tambah dokter...">
    <button onclick="tambahDokter()">Tambah</button>
</div>

    </aside>

    <!-- MAIN -->
    <main class="main">

        <div class="topbar">
            <h1>Farmasi</h1>

            <div class="filter">
                <label>Pilih Bulan</label>
                <input type="month">
                <button class="btn-primary">Muat</button>
            </div>
        </div>

        <!-- NAMA DOKTER AKTIF -->
        <div class="doctor-header">
            <h2 id="selectedDoctor">Belum memilih dokter</h2>
            <button class="btn-add">+</button>
        </div>

        <!-- TABLE -->
        <table class="data-table">
            <thead>
                <tr>
                    <th>Nama Peserta</th>
                    <th>Jam Pelaksanaan</th>
                    <th>Id Peserta</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr>
                    <td colspan="3">Pilih dokter untuk menampilkan data</td>
                </tr>
            </tbody>
        </table>

    </main>

</div>

<script type="module" src="script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<input type="file" id="uploadExcel" accept=".xlsx,.xls" style="display:none;">
</body>
</html>
